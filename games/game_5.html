<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <link rel="stylesheet" href="../resources/css/game_5.css">
    <script src="../resources/js/game_5.js" defer></script>
</head>
<body>
    <h3>Memory Match</h3>
    <p>Find all matching pairs of cards. Click a card to flip it over and reveal its symbol. Try to find the matching pair with the fewest moves possible.</p>
    <div id="game-board">
        <div class="card" data-card="1"></div>
        <div class="card" data-card="2"></div>
        <div class="card" data-card="3"></div>
        <div class="card" data-card="4"></div>
        <div class="card" data-card="5"></div>
        <div class="card" data-card="6"></div>
        <div class="card" data-card="7"></div>
        <div class="card" data-card="8"></div>
        <div class="card" data-card="9"></div>
        <div class="card" data-card="10"></div>
        <div class="card" data-card="11"></div>
        <div class="card" data-card="12"></div>
        <div class="card" data-card="13"></div>
        <div class="card" data-card="14"></div>
        <div class="card" data-card="15"></div>
        <div class="card" data-card="16"></div>
        <div class="card" data-card="17"></div>
        <div class="card" data-card="18"></div>
        <div class="card" data-card="19"></div>
        <div class="card" data-card="20"></div>
        <div class="card" data-card="21"></div>
        <div class="card" data-card="22"></div>
        <div class="card" data-card="23"></div>
        <div class="card" data-card="24"></div>
    </div>
    <div><p id="win_message"></p></div>
    <div class="game-stats">
        <div id="moves">Moves: 0</div>
        <div id="matches">Matches: 0</div>
        <button type="button" id="reset">Reset Game</button>
    </div>
</body>
</html>
