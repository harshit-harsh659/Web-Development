<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roll Game</title>
    <link rel="stylesheet" href="../resources/css/game_4.css">
    <script src="../resources/js/game_4.js" defer></script>
</head>

<body>
    <h1 id="greet">Welcome to Roll to 21</h1>
    <div id="status-message"></div>
    <div id="dice">
        <div id="face"></div>
    </div>
    <div class="game-controls">
        <div class="action-buttons">
            <button type="button" onclick="rollDice()" id="roll">Roll Dice</button>
            <button type="button" onclick="stop_game(turn)" id="stop">Stop Turn</button>
        </div>
        <div class="game-info">
            <p id="turn-display">Player 1 turn</p>
            <p>Player 1 score: <span id="score_1">0</span></p>
            <p>Player 2 score: <span id="score_2">0</span></p>
        </div>
    </div>
    <div class="game-footer">
        <button type="button" onclick="resetGame()" id="reset">New Game</button>
    </div>
</body>

</html>
