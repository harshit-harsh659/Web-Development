<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style> 
    /* Write your code here */
    .blue-box{
      position: relative;
      top:200px;
      left:200px;
      height: 300px;
      width: 500px;
      background-color: blue;
    }
    .red-circle{
      background-color: red;
      width:200px;
      height:200px;
      position: absolute;
      left:250px;
      top:150px;
      border-radius: 50%;
    }
    a{
      position:absolute;
      left:400px;
      top:700px
    }
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>
  <a href="./project_goal_9.png">The goal of this project</a>
</body>

</html>
